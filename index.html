<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Green Land Lawn Care & Landscaping — Where Skill Meets Soil</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#F4F0E6;
  --paper-2:#EBE5D6;
  --paper-3:#E2DAC7;
  --ink:#16241B;
  --ink-soft:#3A4A40;
  --forest:#173E2A;
  --forest-2:#1F5236;
  --green:#2E7048;
  --lime:#C7E85B;
  --lime-deep:#A9CE3C;
  --clay:#9A6B43;
  --line:rgba(22,36,27,0.14);
  --shadow:0 1px 2px rgba(22,36,27,.05),0 8px 28px -12px rgba(22,36,27,.22);
  --shadow-lg:0 30px 70px -32px rgba(22,36,27,.45);
  --serif:"Newsreader",Georgia,serif;
  --sans:"Hanken Grotesk",-apple-system,system-ui,sans-serif;
  --maxw:1240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  font-size:17px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ---------- type ---------- */
.serif{font-family:var(--serif)}
.eyebrow{
  font-family:var(--sans);
  font-weight:700;
  font-size:.72rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--green);
}
h1,h2,h3{font-family:var(--serif);font-weight:500;line-height:1.04;letter-spacing:-.015em}
.display{
  font-family:var(--serif);
  font-weight:400;
  line-height:.98;
  letter-spacing:-.02em;
  font-size:clamp(3.2rem,8.5vw,7rem);
}
.display em{font-style:italic;color:var(--green)}
h2.section-title{
  font-size:clamp(2.4rem,5vw,4rem);
  font-weight:400;
  letter-spacing:-.02em;
}
em.acc{font-style:italic;color:var(--green)}

/* ---------- layout ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px}
section{position:relative}
.sec-pad{padding:clamp(72px,11vh,140px) 0}
.text-w{max-width:62ch}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.6em;
  font-family:var(--sans);font-weight:700;font-size:.98rem;letter-spacing:.01em;
  padding:1rem 1.6rem;border-radius:999px;
  transition:transform .18s ease,background .2s ease,box-shadow .2s ease,color .2s ease;
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--forest);color:var(--paper)}
.btn-primary:hover{background:var(--forest-2);box-shadow:var(--shadow)}
.btn-lime{background:var(--lime);color:var(--ink)}
.btn-lime:hover{background:var(--lime-deep);box-shadow:0 10px 30px -12px rgba(169,206,60,.9)}
.btn-ghost{background:transparent;color:var(--ink);box-shadow:inset 0 0 0 1.5px var(--line)}
.btn-ghost:hover{box-shadow:inset 0 0 0 1.5px var(--ink);background:rgba(22,36,27,.03)}
.btn-ghost-light{background:transparent;color:var(--paper);box-shadow:inset 0 0 0 1.5px rgba(244,240,230,.4)}
.btn-ghost-light:hover{box-shadow:inset 0 0 0 1.5px var(--paper);background:rgba(244,240,230,.08)}

/* ---------- chips ---------- */
.chip{
  display:inline-flex;align-items:center;gap:.5em;
  padding:.5em 1em;border-radius:999px;font-weight:600;font-size:.9rem;
  background:var(--paper-2);color:var(--ink-soft);
  box-shadow:inset 0 0 0 1px var(--line);
}

#app{min-height:100vh}
.boot{display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--serif);font-style:italic;color:var(--green);font-size:1.4rem}

/* reveal */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

::selection{background:var(--lime);color:var(--ink)}
.image-slot-placeholder,image-slot{font-family:var(--sans)!important}
</style>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app"><div class="boot">Green Land…</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
